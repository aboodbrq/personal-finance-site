<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة الحسابات الشخصية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body dir="rtl">

    <header>
        <h1>لوحة الحسابات الشخصية</h1>
    </header>

    <main>

        <section class="stats">
            <div class="card">
                <h3>الدخل</h3>
                <p id="total-income">0 ريال</p>
            </div>

            <div class="card">
                <h3>المصاريف</h3>
                <p id="total-expense">0 ريال</p>
            </div>

            <div class="card">
                <h3>الرصيد</h3>
                <p id="balance">0 ريال</p>
            </div>
        </section>

        <section class="form-section glass">
            <h2>إضافة حركة مالية</h2>
            <form id="transaction-form">
                <label>النوع:</label>
                <select id="type">
                    <option value="income">دخل</option>
                    <option value="expense">مصروف</option>
                </select>

                <label>الفئة:</label>
                <select id="category">
                    <option value="راتب">راتب</option>
                    <option value="عمل حر">عمل حر</option>
                    <option value="إيجار">إيجار</option>
                    <option value="وقود">وقود</option>
                    <option value="طعام">طعام</option>
                    <option value="صحة">صحة</option>
                    <option value="ترفيه">ترفيه</option>
                </select>

                <label>المبلغ:</label>
                <input type="number" id="amount" step="0.01">

                <label>التاريخ:</label>
                <input type="date" id="date">

                <button type="submit">إضافة</button>
            </form>
        </section>

        <section class="table-section glass">
            <h2>الحركات المالية</h2>
            <table>
                <thead>
                    <tr>
                        <th>النوع</th>
                        <th>الفئة</th>
                        <th>المبلغ</th>
                        <th>التاريخ</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="transactions-table"></tbody>
            </table>
        </section>

    </main>

    <footer>
        <p>© حساباتي الشخصية</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
